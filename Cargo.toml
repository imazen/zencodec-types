[package]
name = "zencodec"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "Apache-2.0 OR MIT"
description = "Shared traits and types for zen* image codecs"
categories = ["multimedia::images"]
keywords = ["image", "codec", "traits"]
repository = "https://github.com/imazen/zencodec"
exclude = ["CLAUDE.md", "docs/"]

[lib]
name = "zencodec"

[dependencies]
zenpixels = { path = "../zenpixels/zenpixels", features = ["imgref"] }
enough = "0.4"
whereat = "0.1.3"

[dev-dependencies]
thiserror = "2"
almost-enough = "0.4"
