[package]
name = "zencodec-types"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
license = "Apache-2.0 OR MIT"
description = "Shared traits and types for zen* image codecs"
categories = ["multimedia::images"]
keywords = ["image", "codec", "traits"]
repository = "https://github.com/imazen/zencodec-types"
exclude = ["CLAUDE.md", "docs/"]

[lib]
name = "zc"

[dependencies]
zenpixels = { version = "0.1", features = ["buffer"] }
enough = "0.4"
